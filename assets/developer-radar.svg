<svg width="1200" height="180" viewBox="0 0 1200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="40" y1="20" x2="1160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#7B2FFF"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="1200" height="180" rx="24" fill="#0B1020"/>
  <text x="40" y="42" fill="#EAF7FF" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Developer Radar</text>
  <text x="40" y="67" fill="#7D95B2" font-size="14" font-family="JetBrains Mono, monospace">things I’m strong in and what I’m leveling up next</text>

  <!-- labels -->
  <g font-family="JetBrains Mono, monospace" font-size="14" fill="#D9E9F8">
    <text x="40" y="110">Java</text>
    <text x="40" y="138">Python</text>
    <text x="40" y="166">JavaScript</text>

    <text x="420" y="110">MERN</text>
    <text x="420" y="138">REST APIs</text>
    <text x="420" y="166">MongoDB</text>

    <text x="780" y="110">DSA</text>
    <text x="780" y="138">Cloud / GCP</text>
    <text x="780" y="166">Docker / CI-CD</text>
  </g>

  <!-- bars -->
  <g>
    <rect x="130" y="96" width="220" height="10" rx="5" fill="#1A2745"/>
    <rect x="130" y="96" width="192" height="10" rx="5" fill="url(#grad)">
      <animate attributeName="width" values="30;192" dur="2.5s" fill="freeze"/>
    </rect>

    <rect x="130" y="124" width="220" height="10" rx="5" fill="#1A2745"/>
    <rect x="130" y="124" width="176" height="10" rx="5" fill="url(#grad)">
      <animate attributeName="width" values="30;176" dur="2.8s" fill="freeze"/>
    </rect>

    <rect x="130" y="152" width="220" height="10" rx="5" fill="#1A2745"/>
    <rect x="130" y="152" width="170" height="10" rx="5" fill="url(#grad)">
      <animate attributeName="width" values="30;170" dur="3s" fill="freeze"/>
    </rect>

    <rect x="535" y="96" width="190" height="10" rx="5" fill="#1A2745"/>
    <rect x="535" y="96" width="175" height="10" rx="5" fill="url(#grad)">
      <animate attributeName="width" values="30;175" dur="3.2s" fill="freeze"/>
    </rect>

    <rect x="535" y="124" width="190" height="10" rx="5" fill="#1A2745"/>
    <rect x="535" y="124" width="168" height="10" rx="5" fill="url(#grad)">
      <animate attributeName="width" values="30;168" dur="3.4s" fill="freeze"/>
    </rect>

    <rect x="535" y="152" width="190" height="10" rx="5" fill="#1A2745"/>
    <rect x="535" y="152" width="150" height="10" rx="5" fill="url(#grad)">
      <animate attributeName="width" values="30;150" dur="3.6s" fill="freeze"/>
    </rect>

    <rect x="930" y="96" width="200" height="10" rx="5" fill="#1A2745"/>
    <rect x="930" y="96" width="182" height="10" rx="5" fill="url(#grad)">
      <animate attributeName="width" values="30;182" dur="3.8s" fill="freeze"/>
    </rect>

    <rect x="930" y="124" width="200" height="10" rx="5" fill="#1A2745"/>
    <rect x="930" y="124" width="140" height="10" rx="5" fill="url(#grad)">
      <animate attributeName="width" values="30;140" dur="4s" fill="freeze"/>
    </rect>

    <rect x="930" y="152" width="200" height="10" rx="5" fill="#1A2745"/>
    <rect x="930" y="152" width="118" height="10" rx="5" fill="url(#grad)">
      <animate attributeName="width" values="30;118" dur="4.2s" fill="freeze"/>
    </rect>
  </g>

  <circle cx="1140" cy="38" r="6" fill="#00F5B8" filter="url(#g)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="1120" y="44" text-anchor="end" fill="#7D95B2" font-size="13" font-family="JetBrains Mono, monospace">live growth</text>
</svg>
