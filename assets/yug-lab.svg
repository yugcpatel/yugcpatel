<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B14"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E1332"/>
    </linearGradient>

    <!-- Accent Line Gradient -->
    <linearGradient id="accent" x1="100" y1="70" x2="1100" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D9FF"/>
      <stop offset="0.5" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7B2FFF"/>
    </linearGradient>

    <!-- Glow Filter for Objects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Intense Glow -->
    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop Shadow for Windows -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
      <circle cx="40" cy="40" r="1" fill="#FFFFFF" fill-opacity="0.1"/>
    </pattern>

    <!-- Scanning Line Glow -->
    <linearGradient id="scanGlow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00D9FF" stop-opacity="1"/>
      <stop offset="1" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>

    <!-- Typing Mask -->
    <clipPath id="typewriter">
      <rect x="0" y="30" width="0" height="70">
        <animate attributeName="width" 
                 values="0; 30; 55; 80; 95; 125; 150; 170; 195; 225; 225; 0" 
                 keyTimes="0; 0.1; 0.13; 0.16; 0.19; 0.22; 0.25; 0.28; 0.31; 0.34; 0.95; 1" 
                 calcMode="discrete" 
                 dur="6s" 
                 repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="420" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="20" fill="url(#grid)"/>

  <!-- Main Terminal Window -->
  <g filter="url(#dropShadow)">
    <rect x="50" y="55" width="730" height="285" rx="16" fill="#0A1128" fill-opacity="0.85" stroke="#1E2B4D" stroke-width="1.5"/>
    <!-- Terminal Header Bar -->
    <rect x="50" y="55" width="730" height="35" rx="16" fill="#131B33" fill-opacity="0.9"/>
    <!-- Remove bottom rounded corners of header implicitly with a rect over bottom half -->
    <rect x="50" y="75" width="730" height="15" fill="#131B33" fill-opacity="0.9"/>
    <line x1="50" y1="90" x2="780" y2="90" stroke="#1E2B4D" stroke-width="1.5"/>
    
    <!-- Window Controls (Red, Yellow, Green Dots) properly placed in header -->
    <circle cx="75" cy="73" r="5" fill="#FF5F56"/>
    <circle cx="95" cy="73" r="5" fill="#FFBD2E"/>
    <circle cx="115" cy="73" r="5" fill="#27C93F"/>
    
    <!-- Terminal Title -->
    <text x="415" y="78" fill="#6A86A8" font-size="13" font-family="JetBrains Mono, monospace" text-anchor="middle">yug-lab@dev-server:~</text>
  </g>

  <!-- Main Terminal Content -->
  <g transform="translate(90, 110)">
    <!-- Initialization Text -->
    <text x="0" y="25" fill="#00D9FF" font-size="18" font-family="JetBrains Mono, monospace" filter="url(#glow)">$ ./init_system --profile</text>
    
    <!-- Big Name -->
    <text x="0" y="85" fill="#FFFFFF" font-size="44" font-weight="800" font-family="Segoe UI, -apple-system, sans-serif" letter-spacing="1" clip-path="url(#typewriter)">Yug Patel</text>
    
    <!-- Typing cursor mimicking terminal -->
    <rect x="0" y="44" width="22" height="48" fill="#00D9FF" opacity="0.8">
      <animate attributeName="opacity" values="0;1;0" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="x" 
               values="0; 30; 55; 80; 95; 125; 150; 170; 195; 225; 225; 0" 
               keyTimes="0; 0.1; 0.13; 0.16; 0.19; 0.22; 0.25; 0.28; 0.31; 0.34; 0.95; 1" 
               calcMode="discrete" 
               dur="6s" 
               repeatCount="indefinite"/>
    </rect>

    <!-- Skill Highlights -->
    <g transform="translate(0, 137)">
      <text x="0" y="0" fill="#A3B8CC" font-size="20" font-family="JetBrains Mono, monospace">
        <tspan fill="#7B2FFF" font-weight="bold">&gt; </tspan>Full-Stack Builder
      </text>
      <text x="0" y="35" fill="#A3B8CC" font-size="20" font-family="JetBrains Mono, monospace">
        <tspan fill="#7B2FFF" font-weight="bold">&gt; </tspan>MERN | Java | Python | Cloud
      </text>
      <text x="0" y="70" fill="#A3B8CC" font-size="20" font-family="JetBrains Mono, monospace">
        <tspan fill="#7B2FFF" font-weight="bold">&gt; </tspan>clean systems • strong fundamentals • shipped projects
      </text>
    </g>
  </g>

  <!-- Side Box: Skills Monitor -->
  <g filter="url(#dropShadow)" transform="translate(810, 55)">
    <!-- Container -->
    <rect x="0" y="0" width="340" height="285" rx="16" fill="#0A1128" fill-opacity="0.85" stroke="#283A6A" stroke-width="1.5"/>
    
    <!-- Header -->
    <text x="25" y="35" fill="#00D9FF" font-size="14" font-weight="bold" font-family="JetBrains Mono, monospace" letter-spacing="2" filter="url(#glow)">[ SYSTEM_METRICS ]</text>
    <line x1="25" y1="48" x2="315" y2="48" stroke="#1E2B4D" stroke-width="1"/>

    <!-- Skill 1: Frontend -->
    <g transform="translate(25, 75)">
      <text x="0" y="0" fill="#E2E8F0" font-size="14" font-family="JetBrains Mono, monospace">FRONTEND</text>
      <text x="290" y="0" fill="#6A86A8" font-size="12" font-family="JetBrains Mono, monospace" text-anchor="end">90%</text>
      <!-- Background Bar -->
      <rect x="0" y="10" width="290" height="6" rx="3" fill="#131B33"/>
      <!-- Progress Bar (cyan) -->
      <rect x="0" y="10" width="260" height="6" rx="3" fill="#00D9FF" filter="url(#glow)"/>
    </g>

    <!-- Skill 2: Backend -->
    <g transform="translate(25, 125)">
      <text x="0" y="0" fill="#E2E8F0" font-size="14" font-family="JetBrains Mono, monospace">BACKEND</text>
      <text x="290" y="0" fill="#6A86A8" font-size="12" font-family="JetBrains Mono, monospace" text-anchor="end">85%</text>
      <rect x="0" y="10" width="290" height="6" rx="3" fill="#131B33"/>
      <!-- Progress Bar (purple) -->
      <rect x="0" y="10" width="245" height="6" rx="3" fill="#7B2FFF" filter="url(#glow)"/>
    </g>

    <!-- Skill 3: Database -->
    <g transform="translate(25, 175)">
      <text x="0" y="0" fill="#E2E8F0" font-size="14" font-family="JetBrains Mono, monospace">DATABASE/SYS</text>
      <text x="290" y="0" fill="#6A86A8" font-size="12" font-family="JetBrains Mono, monospace" text-anchor="end">80%</text>
      <rect x="0" y="10" width="290" height="6" rx="3" fill="#131B33"/>
      <!-- Progress Bar (green-teal) -->
      <rect x="0" y="10" width="230" height="6" rx="3" fill="#00F5B8" filter="url(#glow)"/>
    </g>

    <!-- Skill 4: Cloud -->
    <g transform="translate(25, 225)">
      <text x="0" y="0" fill="#E2E8F0" font-size="14" font-family="JetBrains Mono, monospace">CLOUD/DEVOPS</text>
      <text x="290" y="0" fill="#6A86A8" font-size="12" font-family="JetBrains Mono, monospace" text-anchor="end">75%</text>
      <rect x="0" y="10" width="290" height="6" rx="3" fill="#131B33"/>
      <!-- Progress Bar (orange-yellow) -->
      <rect x="0" y="10" width="215" height="6" rx="3" fill="#FFBD2E" filter="url(#glow)"/>
    </g>
    
    <!-- Animated Scanning Light -->
    <rect x="10" y="60" width="320" height="205" fill="transparent"/>
    <rect x="-10" y="70" width="360" height="2" fill="url(#scanGlow)" opacity="0.6" filter="url(#glow)">
      <animate attributeName="y" values="70;265;70" dur="4s" repeatCount="indefinite" keyTimes="0;0.5;1"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" keyTimes="0;0.5;1"/>
    </rect>
  </g>

  <!-- Status Bar / Decorative Pill -->
  <g transform="translate(810, 360)" filter="url(#dropShadow)">
    <rect width="340" height="42" rx="12" fill="#0C152D" fill-opacity="0.9" stroke="#22315F" stroke-width="1.5"/>
    <text x="20" y="26" fill="#9AD8FF" font-size="15" font-family="JetBrains Mono, monospace">sys.status: building reality</text>
    <circle cx="310" cy="21" r="5" fill="#00F5B8" filter="url(#glow)">
       <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Dynamic Circuit / Accent Path -->
  <path d="M50 377 C 250 377, 450 370, 780 377" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8" filter="url(#intenseGlow)">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M50 377 C 250 377, 450 370, 780 377;
                M50 377 C 300 395, 500 350, 780 377;
                M50 377 C 250 377, 450 370, 780 377"/>
  </path>
  <!-- Overlaid sharp path to give core -->
  <path d="M50 377 C 250 377, 450 370, 780 377" stroke="#FFF" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.9">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M50 377 C 250 377, 450 370, 780 377;
                M50 377 C 300 395, 500 350, 780 377;
                M50 377 C 250 377, 450 370, 780 377"/>
  </path>

  <!-- Footer Tagline -->
  <text x="50" y="405" fill="#6A86A8" font-size="14" text-anchor="start" font-family="JetBrains Mono, monospace" letter-spacing="1">crafted for recruiters • built to feel memorable</text>

  <!-- Floating Particles/Stars in Background -->
  <circle cx="200" cy="30" r="1.5" fill="#FFF" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.8;0.1" dur="3s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="500" cy="400" r="2" fill="#00D9FF" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="950" cy="40" r="1.5" fill="#7B2FFF" opacity="0.5">
    <animate attributeName="opacity" values="0.1;1;0.1" dur="2.5s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="45" cy="200" r="1.5" fill="#FFF" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

</svg>
