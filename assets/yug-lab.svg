<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.5" stop-color="#111936"/>
      <stop offset="1" stop-color="#170C29"/>
    </linearGradient>

    <linearGradient id="accent" x1="160" y1="70" x2="830" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#7B2FFF"/>
    </linearGradient>

    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00D9FF" stop-opacity="1"/>
      <stop offset="1" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>

    <clipPath id="screenClip">
      <rect x="760" y="86" width="300" height="196" rx="18"/>
    </clipPath>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="30" fill="url(#grid)"/>

  <circle cx="175" cy="84" r="3.8" fill="#FF5F56"/>
  <circle cx="192" cy="84" r="3.8" fill="#FFBD2E"/>
  <circle cx="209" cy="84" r="3.8" fill="#27C93F"/>

  <g opacity="0.95">
    <rect x="82" y="116" width="625" height="224" rx="24" fill="#0D152F" stroke="#22315F"/>
    <rect x="100" y="139" width="589" height="188" rx="18" fill="#081121"/>
    <g filter="url(#softGlow)">
      <text x="118" y="176" fill="#9AD8FF" font-size="19" font-family="JetBrains Mono, monospace">booting_yugOS v2.6.0</text>
      <text x="118" y="208" fill="#EAF7FF" font-size="45" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Yug Patel</text>
      <text x="118" y="246" fill="#89A3C0" font-size="21" font-family="JetBrains Mono, monospace">&gt; Full-Stack Builder</text>
      <text x="118" y="276" fill="#89A3C0" font-size="21" font-family="JetBrains Mono, monospace">&gt; MERN | Java | Python | Cloud</text>
      <text x="118" y="306" fill="#89A3C0" font-size="21" font-family="JetBrains Mono, monospace">&gt; clean systems • strong fundamentals • shipped projects</text>
    </g>

    <rect x="760" y="86" width="300" height="196" rx="18" fill="#081121" stroke="#28406F"/>
    <g clip-path="url(#screenClip)">
      <rect x="760" y="86" width="300" height="196" fill="#07101F"/>
      <path d="M760 130H1060" stroke="#10213C" stroke-width="1"/>
      <path d="M760 174H1060" stroke="#10213C" stroke-width="1"/>
      <path d="M760 218H1060" stroke="#10213C" stroke-width="1"/>
      <path d="M760 262H1060" stroke="#10213C" stroke-width="1"/>

      <g opacity="0.95">
        <rect x="785" y="114" width="95" height="10" rx="5" fill="#00D9FF"/>
        <rect x="785" y="158" width="148" height="10" rx="5" fill="#7B2FFF"/>
        <rect x="785" y="202" width="124" height="10" rx="5" fill="#00D9FF"/>
        <rect x="785" y="246" width="168" height="10" rx="5" fill="#7B2FFF"/>
      </g>

      <rect x="740" y="100" width="120" height="4" fill="url(#lineGlow)" opacity="0.9">
        <animate attributeName="x" values="740;1020;740" dur="4.2s" repeatCount="indefinite"/>
      </rect>

      <g opacity="0.2">
        <rect x="760" y="86" width="300" height="18" fill="#FFFFFF">
          <animate attributeName="y" values="86;264;86" dur="5.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.15;0" dur="5.5s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

    <g transform="translate(760 302)">
      <rect width="300" height="38" rx="12" fill="#0D152F" stroke="#22315F"/>
      <text x="20" y="25" fill="#B8C7DA" font-size="18" font-family="JetBrains Mono, monospace">status: shipping ideas into reality</text>
      <text x="285" y="25" text-anchor="end" fill="#00F5B8" font-size="18" font-family="JetBrains Mono, monospace">●</text>
    </g>
  </g>

  <path d="M104 356C300 338 538 342 718 356" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.65" filter="url(#softGlow)">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M104 356C300 338 538 342 718 356;
              M104 356C280 374 520 326 718 356;
              M104 356C300 338 538 342 718 356"/>
  </path>

  <text x="1000" y="370" fill="#6A86A8" font-size="15" text-anchor="end" font-family="JetBrains Mono, monospace">crafted for recruiters • built to feel memorable</text>
</svg>
